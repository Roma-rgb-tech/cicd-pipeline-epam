<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a2540" stroke="#1a6cf7" stroke-width="4"/>

  <!-- Gear / CI icon -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#1a6cf7" stroke-width="6"/>
  <circle cx="100" cy="100" r="12" fill="#1a6cf7"/>

  <!-- Gear teeth -->
  <rect x="93" y="55" width="14" height="18" rx="3" fill="#1a6cf7"/>
  <rect x="93" y="127" width="14" height="18" rx="3" fill="#1a6cf7"/>
  <rect x="55"  y="93" width="18" height="14" rx="3" fill="#1a6cf7"/>
  <rect x="127" y="93" width="18" height="14" rx="3" fill="#1a6cf7"/>

  <!-- Diagonal teeth -->
  <rect x="66" y="63" width="14" height="18" rx="3" fill="#1a6cf7" transform="rotate(-45 73 72)"/>
  <rect x="120" y="119" width="14" height="18" rx="3" fill="#1a6cf7" transform="rotate(-45 127 128)"/>
  <rect x="119" y="63" width="14" height="18" rx="3" fill="#1a6cf7" transform="rotate(45 126 72)"/>
  <rect x="66" y="119" width="14" height="18" rx="3" fill="#1a6cf7" transform="rotate(45 73 128)"/>

  <!-- Text: MAIN -->
  <text x="100" y="168" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
        fill="#1a6cf7" text-anchor="middle" letter-spacing="4">MAIN</text>

  <!-- Small dot accent -->
  <circle cx="100" cy="182" r="4" fill="#1a6cf7"/>
</svg>
